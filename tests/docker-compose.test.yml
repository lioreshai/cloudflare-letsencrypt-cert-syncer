# Test infrastructure for cloudflare-letsencrypt-cert-syncer
# Provides mock SSH endpoints for MikroTik, pfSense, and QNAP testing

services:
  mock-mikrotik:
    build:
      context: ./mock-mikrotik
    container_name: test-mock-mikrotik
    hostname: mock-mikrotik
    ports:
      - "2222:22"
    volumes:
      - ./mock-mikrotik/state:/state

  mock-pfsense:
    build:
      context: ./mock-pfsense
    container_name: test-mock-pfsense
    hostname: mock-pfsense
    ports:
      - "2223:22"
    volumes:
      - ./mock-pfsense/state:/state

  mock-qnap:
    build:
      context: ./mock-qnap
    container_name: test-mock-qnap
    hostname: mock-qnap
    ports:
      - "2224:22"
    volumes:
      - ./mock-qnap/state:/state
